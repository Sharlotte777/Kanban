<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kanban Board – руководство пользователя</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
<div id="app"></div>
<script>
    window.$docsify = {
      name: 'Kanban Board',
      repo: 'https://sharlotte777.github.io/Kanban/', 
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: 'auto',      // добавит поиск по всем разделам
      copyCode: true       // кнопка копирования кода
    }
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
<!--плагин для поиска-->
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<!--плагин для копирования кода-->
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
</body>
</html>
